<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <title>DoodleRun route</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <style>
    :root {
      --route-color: #1a73e8;
      --outline-color: #d93025;
      --bg: #f7f7f8;
      --fg: #111;
      --muted: #5f6368;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100vw;
    }
    header {
      padding: 10px 14px calc(10px + env(safe-area-inset-top));
      padding-top: max(10px, env(safe-area-inset-top));
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    header .stats {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }
    #map {
      flex: 1;
      width: 100%;
      min-height: 0;   /* let flex shrink the map below content height */
    }
    footer {
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: #fff;
      border-top: 1px solid #e5e5ea;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1 1 auto;
      min-height: 44px;   /* iOS touch-target floor */
      border: 0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn.primary {
      background: var(--route-color);
      color: #fff;
    }
    .btn.secondary {
      background: #f1f3f4;
      color: var(--fg);
    }
    #error {
      padding: 14px;
      color: #b00020;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1 id="title">Loading…</h1>
      <span class="stats" id="stats"></span>
    </header>
    <div id="map"></div>
    <footer id="footer" hidden>
      <a class="btn primary" id="gpx-btn" href="#">Download GPX</a>
      <a class="btn secondary" id="kml-btn" href="#">Download KML</a>
    </footer>
    <div id="error" hidden></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script>
    // The server substitutes __SHARE_ID__ before serving this page.
    const SHARE_ID = "__SHARE_ID__";

    const SHAPE_NAMES = {
      pig: "Pig 🐷", cat: "Cat 🐱", dog: "Dog 🐶",
      dino: "Dino 🦖", chicken: "Chicken 🐔",
    };

    const map = L.map("map", { zoomControl: true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    }).addTo(map);

    function showError(msg) {
      document.getElementById("title").textContent = "DoodleRun";
      document.getElementById("error").hidden = false;
      document.getElementById("error").textContent = msg;
      document.getElementById("map").style.display = "none";
    }

    async function load() {
      try {
        const res = await fetch(`/shared/${encodeURIComponent(SHARE_ID)}`);
        if (!res.ok) {
          showError(res.status === 404
            ? "This share link has expired or doesn't exist."
            : `Server error ${res.status}`);
          return;
        }
        const data = await res.json();

        // GeoJSON LineString = [lon, lat]; Leaflet wants [lat, lon].
        const routeLatLng = (data.geojson.coordinates || [])
          .map(([lon, lat]) => [lat, lon]);
        // waypoints are already [lat, lon].
        const idealLatLng = (data.waypoints || []);

        if (routeLatLng.length === 0) {
          showError("No route geometry in this share.");
          return;
        }

        const route = L.polyline(routeLatLng, {
          color: "#1a73e8",
          weight: 5,
          opacity: 0.85,
        }).addTo(map);

        if (idealLatLng.length) {
          L.polyline(idealLatLng, {
            color: "#d93025",
            weight: 2,
            opacity: 0.7,
            dashArray: "6,8",
          }).addTo(map);
        }

        L.marker(routeLatLng[0]).addTo(map).bindPopup("Start");
        L.marker(routeLatLng[routeLatLng.length - 1]).addTo(map).bindPopup("Finish");

        map.fitBounds(route.getBounds(), { padding: [30, 30] });

        const km = (data.routed_distance_m / 1000).toFixed(2);
        const shapeLabel = SHAPE_NAMES[data.shape] || data.shape;
        document.getElementById("title").textContent = `${shapeLabel} run`;
        document.getElementById("stats").textContent = `${km} km`;

        document.getElementById("gpx-btn").href = `/shared/${SHARE_ID}.gpx`;
        document.getElementById("kml-btn").href = `/shared/${SHARE_ID}.kml`;
        document.getElementById("footer").hidden = false;
      } catch (err) {
        showError("Couldn't load this route: " + err.message);
      }
    }

    load();
  </script>
</body>
</html>
